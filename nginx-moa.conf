# moa — 반기 성과 취합 / 회고 리포트 (Swift Vapor, Docker :3110)
# /etc/nginx/conf.d/dev-tools.conf 의 server { ... } 블록 안에 아래 location 2개 추가.
# 적용: sudo nginx -t && sudo systemctl reload nginx

location = /moa { return 301 /moa/; }

location /moa/ {
    proxy_pass http://127.0.0.1:3110/moa/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Jira 페이지네이션 수집이 느릴 수 있어 넉넉히
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
